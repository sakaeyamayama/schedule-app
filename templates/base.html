<!DOCTYPE html>
<html lang="ja" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}チームスケジュール管理{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans JP', sans-serif; }
    #sidebar {
      width: 220px;
      min-height: 100vh;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      flex-shrink: 0;
    }
    #main-content { flex: 1; min-width: 0; }
    .nav-link.active { font-weight: 600; }
    .nav-link { color: var(--bs-body-color); }
    .nav-link:hover { color: var(--bs-primary); }
    .sidebar-header { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.08em; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

<div class="d-flex">

  <!-- サイドバー -->
  <nav id="sidebar" class="border-end p-3 d-flex flex-column">
    <div class="mb-4">
      <span class="fw-bold fs-6">
        <i class="bi bi-calendar3 me-2 text-primary"></i>スケジュール管理
      </span>
    </div>

    <ul class="nav flex-column gap-1 flex-grow-1">
      <li class="nav-item">
        <span class="sidebar-header text-secondary px-2 mb-1 d-block">メイン</span>
      </li>
      <li class="nav-item">
        <a href="{% url 'schedule:index' %}" class="nav-link rounded px-2 py-2 {% block nav_schedule %}{% endblock %}">
          <i class="bi bi-calendar-week me-2"></i>スケジュール
        </a>
      </li>
      <li class="nav-item">
        <a href="{% url 'actual:index' %}" class="nav-link rounded px-2 py-2 {% block nav_actual %}{% endblock %}">
          <i class="bi bi-clock-history me-2"></i>実績
        </a>
      </li>
      <li class="nav-item">
        <a href="{% url 'comparison:index' %}" class="nav-link rounded px-2 py-2 {% block nav_comparison %}{% endblock %}">
          <i class="bi bi-graph-up me-2"></i>予実比較
        </a>
      </li>

      <li class="nav-item mt-3">
        <span class="sidebar-header text-secondary px-2 mb-1 d-block">管理</span>
      </li>
      <li class="nav-item">
        <a href="{% url 'master:index' %}" class="nav-link rounded px-2 py-2 {% block nav_master %}{% endblock %}">
          <i class="bi bi-database me-2"></i>マスタ管理
        </a>
      </li>
      <li class="nav-item">
        <a href="{% url 'importer:index' %}" class="nav-link rounded px-2 py-2 {% block nav_importer %}{% endblock %}">
          <i class="bi bi-upload me-2"></i>CSVインポート
        </a>
      </li>
    </ul>

    <!-- テーマ切り替え -->
    <div class="mt-auto pt-3 border-top">
      <button id="theme-toggle" class="btn btn-sm btn-outline-secondary w-100">
        <i class="bi bi-moon-fill me-1" id="theme-icon"></i>
        <span id="theme-label">ダークモード</span>
      </button>
    </div>
  </nav>

  <!-- メインコンテンツ -->
  <div id="main-content" class="p-4">

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // テーマ切り替え
  const html = document.documentElement;
  const btn = document.getElementById('theme-toggle');
  const icon = document.getElementById('theme-icon');
  const label = document.getElementById('theme-label');

  const saved = localStorage.getItem('theme') || 'light';
  applyTheme(saved);

  btn.addEventListener('click', () => {
    const next = html.getAttribute('data-bs-theme') === 'light' ? 'dark' : 'light';
    applyTheme(next);
    localStorage.setItem('theme', next);
  });

  function applyTheme(theme) {
    html.setAttribute('data-bs-theme', theme);
    if (theme === 'dark') {
      icon.className = 'bi bi-sun-fill me-1';
      label.textContent = 'ライトモード';
    } else {
      icon.className = 'bi bi-moon-fill me-1';
      label.textContent = 'ダークモード';
    }
  }
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
