{% extends 'base.html' %}
{% block title %}予定{% if object %}編集{% else %}登録{% endif %}{% endblock %}
{% block nav_schedule %}active{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-6 col-lg-5">
    <div class="card">
      <div class="card-header fw-semibold">
        <i class="bi bi-calendar-plus me-2"></i>予定{% if object %}編集{% else %}登録{% endif %}
      </div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">メンバー</label>
            <select name="member" class="form-select" required>
              <option value="">-- 選択 --</option>
              {% for m in form.member.field.queryset %}
              <option value="{{ m.pk }}" {% if form.member.value|slugify == m.pk|slugify %}selected{% endif %}>{{ m.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">作業</label>
            <select name="task" class="form-select" required>
              <option value="">-- 選択 --</option>
              {% for t in tasks %}
              <option value="{{ t.pk }}" {% if form.task.value|slugify == t.pk|slugify %}selected{% endif %}>
                {{ t.project.name }} / {{ t.name }}
              </option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">日付</label>
            <input type="date" name="date" value="{{ form.date.value|date:'Y-m-d'|default:'' }}"
                   class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">予定時間（時間）</label>
            <input type="number" name="hours" value="{{ form.hours.value|default:'' }}"
                   min="1" max="24" class="form-control" required>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">保存</button>
            <a href="{% url 'schedule:index' %}" class="btn btn-outline-secondary">キャンセル</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
